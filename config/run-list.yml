site_groups:
  column: run_group
  default: batch_001
  start_with_groups: true
  suggested_sites_per_group: 25-50
  notes: Put very large watersheds in smaller groups before launching full exports

active_run: era5_land_annual_full_2000_2025
launch:
  start_at: 0
  max_tasks_per_session: 2
  notes: Launch a small chunk, check outputs, then increase once the run looks good

outputs:
  current_timing:
    - monthly
    - monthly_by_year
    - annual
    - static
  later_timing:
    - daily
    - weekly
  notes: Daily or weekly outputs can be added later from daily source products when needed

runs:
  era5_land_annual_full_2000_2025:
    mode: era5_land
    products:
      - precip
      - temp
      - evapotrans
      - potential_evap
      - snow_cover
      - snow_water_equiv
    timing: annual
    start_year: 2000
    end_year: 2025
    run_groups: all
    launch_export: true
    notes: Config-driven grouped fallback for the current full annual ERA5-Land pull; primary Colab runs one all-site export per year

  era5_land_annual_overlap_2001_2022:
    mode: era5_land
    products:
      - precip
      - temp
      - evapotrans
      - potential_evap
      - snow_cover
      - snow_water_equiv
    timing: annual
    start_year: 2001
    end_year: 2022
    run_groups: all
    launch_export: false
    notes: Shared comparison window for ERA5-Land, MODIS, and GLC_FCS30D

  modis_annual_overlap_2001_2022:
    mode: single_product
    products:
      - npp
      - greenup_day
    timing: annual
    start_year: 2001
    end_year: 2022
    run_groups: all
    launch_export: false
    notes: Annual MODIS pull for the same shared window

  land_cover_annual_overlap_2001_2022:
    mode: single_product
    products:
      - land_cover
    timing: annual
    start_year: 2001
    end_year: 2022
    run_groups: all
    launch_export: false
    notes: GLC_FCS30D annual land-cover window; class-fraction export still needs its own extractor before launching

  era5_land_annual_pilot:
    mode: era5_land
    products:
      - precip
      - temp
      - evapotrans
      - potential_evap
      - snow_cover
      - snow_water_equiv
    timing: annual
    start_year: 2020
    end_year: 2020
    run_groups:
      - batch_001
    launch_export: true

  era5_land_monthly_pilot:
    mode: era5_land
    products:
      - precip
      - temp
      - evapotrans
      - potential_evap
      - snow_cover
      - snow_water_equiv
    timing: monthly
    start_year: 2020
    end_year: 2020
    months:
      - 1
    run_groups:
      - batch_001
    launch_export: false

  era5_land_monthly_year_pilot:
    mode: era5_land
    products:
      - precip
      - temp
      - evapotrans
      - potential_evap
      - snow_cover
      - snow_water_equiv
    timing: monthly_by_year
    start_year: 2020
    end_year: 2020
    months: all
    run_groups:
      - batch_001
    launch_export: false
    notes: One export file with all 12 months for one site group; use this before launching the full monthly run

  era5_land_monthly_full:
    mode: era5_land
    products:
      - precip
      - temp
      - evapotrans
      - potential_evap
      - snow_cover
      - snow_water_equiv
    timing: monthly_by_year
    start_year: 2000
    end_year: 2025
    months: all
    run_groups: all
    launch_export: false
    notes: Monthly ERA5-Land, bundled by year so each task writes 12 months for one site group

  modis_annual_full:
    mode: single_product
    products:
      - npp
      - greenup_day
    timing: annual
    start_year: 2001
    end_year: 2023
    run_groups: all
    launch_export: false

  static_context_full:
    mode: single_product
    products:
      - elevation
      - permafrost
    timing: static
    run_groups: all
    launch_export: false
    notes: Static continuous context layers; permafrost needs the project asset path before this can launch
